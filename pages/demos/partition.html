<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Partition</title>
<link rel="modulepreload" href="../../src/layout.ts">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    overflow: hidden;
    background: #fff;
    cursor: crosshair;
    user-select: none;
    -webkit-user-select: none;
  }

  #viewport {
    position: fixed;
    inset: 0;
    overflow: hidden;
  }

  #world {
    position: absolute;
    width: 0; height: 0;
    left: 50%; top: 50%;
    transform-style: preserve-3d;
    will-change: transform;
  }

  /* ── wireframe element (6-face box) ── */
  .wf {
    position: absolute;
    transform-style: preserve-3d;
    will-change: transform, opacity;
  }

  .face {
    position: absolute;
    border: 1px solid rgba(0, 0, 0, 0.3);
    background: transparent;
    backface-visibility: visible;
    transform-origin: center center;
  }

  /* text on a face */
  .face-text {
    position: absolute;
    inset: 0;
    padding: 8px 10px;
    overflow: hidden;
  }

  .face-text .tl {
    white-space: pre;
    line-height: 1;
  }

  /* ── ground grid ── */
  .grid-line {
    position: absolute;
    background: rgba(0, 0, 0, 0.06);
    backface-visibility: hidden;
  }

  /* ── light source marker ── */
  .light-marker {
    position: absolute;
    width: 4px; height: 4px;
    background: rgba(0, 0, 0, 0.5);
    border-radius: 50%;
    box-shadow: 0 0 40px 12px rgba(0, 0, 0, 0.06),
                0 0 120px 40px rgba(0, 0, 0, 0.02);
    transform-style: preserve-3d;
    pointer-events: none;
  }

  /* ── HUD ── */
  #hud {
    position: fixed;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 100;
    font: 10px/1.4 "SF Mono", ui-monospace, monospace;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #ccc;
    text-align: center;
    pointer-events: none;
    transition: opacity 4s ease;
  }
  #hud.faded { opacity: 0; }

  #depth-indicator {
    position: fixed;
    top: 16px; right: 20px;
    z-index: 100;
    font: 9px/1 "SF Mono", ui-monospace, monospace;
    color: #ccc;
    letter-spacing: 0.1em;
    font-variant-numeric: tabular-nums;
    pointer-events: none;
  }

  #title-overlay {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    z-index: 200;
    text-align: center;
    pointer-events: none;
    transition: opacity 2s ease;
  }
  #title-overlay.hidden { opacity: 0; }
  #title-overlay h1 {
    font: 200 clamp(28px, 5vw, 44px)/1.1 "Helvetica Neue", Helvetica, Arial, sans-serif;
    color: rgba(0, 0, 0, 0.8);
    letter-spacing: 0.06em;
    margin-bottom: 8px;
  }
  #title-overlay p {
    font: 10px/1.6 "SF Mono", ui-monospace, monospace;
    color: #999;
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }
</style>
</head>
<body>
  <div id="viewport">
    <div id="world"></div>
  </div>

  <div id="title-overlay">
    <h1>Partition</h1>
    <p>click to enter &middot; wasd to move &middot; mouse to look</p>
  </div>
  <div id="hud">wasd &middot; mouse &middot; space/shift: rise/descend</div>
  <div id="depth-indicator"></div>

  <script type="module" src="./partition.ts"></script>
</body>
</html>
